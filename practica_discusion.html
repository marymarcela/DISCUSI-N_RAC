<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Práctica · Redacción de la Discusión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --surface2: #221f32;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #fffffe;
    --text2: #a7a5b8;
    --text3: #6b6880;
    --accent: #7c5cbf;
    --accent-glow: rgba(124,92,191,0.18);
    --teal: #2cb67d;
    --amber: #f0a500;
    --coral: #e06c75;
    --sky: #4fc4cf;
    --green: #3ddc97;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  header {
    display: flex; align-items: center; gap: 1.5rem;
    padding: 0.9rem 1.75rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem; font-weight: 600;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  .header-meta { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .pill {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.04em;
    padding: 3px 10px; border-radius: 999px;
    border: 1px solid var(--border2);
    color: var(--text2);
    background: transparent;
  }

  /* ── LAYOUT ── */
  .app { display: flex; flex: 1; overflow: hidden; min-height: calc(100vh - 54px); }

  /* ── SIDEBAR ── */
  nav {
    width: 210px; min-width: 210px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 1rem 0;
    flex-shrink: 0;
  }
  .nav-section {
    font-size: 0.67rem; font-weight: 500; letter-spacing: 0.1em;
    color: var(--text3); text-transform: uppercase;
    padding: 0.6rem 1.2rem 0.3rem;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 9px;
    width: 100%; padding: 7px 1.2rem;
    background: none; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.87rem; color: var(--text2);
    text-align: left; transition: background 0.15s, color 0.15s;
    border-left: 2px solid transparent;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active {
    background: var(--surface2); color: var(--text);
    border-left-color: var(--accent);
  }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .nav-icon { font-size: 1rem; opacity: 0.7; }

  /* ── MAIN CONTENT ── */
  main {
    flex: 1; overflow-y: auto;
    padding: 2rem 2.25rem;
    background: var(--bg);
  }

  /* ── OVERVIEW ── */
  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem; font-weight: 600;
    color: var(--text); margin-bottom: 0.35rem;
  }
  .page-sub { font-size: 0.87rem; color: var(--text2); margin-bottom: 1.75rem; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.75rem; }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    text-align: center;
  }
  .metric-val {
    font-family: 'Fraunces', serif;
    font-size: 2rem; font-weight: 600; color: var(--text);
    line-height: 1;
  }
  .metric-lbl { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }
  .groups-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    text-align: left;
  }
  .group-card:hover { border-color: var(--border2); background: var(--surface2); }
  .group-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .group-card-num {
    font-size: 0.72rem; font-weight: 500; color: var(--text3);
  }
  .group-card-title {
    font-size: 0.93rem; font-weight: 500; color: var(--text); line-height: 1.4;
  }
  .group-card-sub { font-size: 0.75rem; color: var(--text3); margin-top: 4px; }

  /* ── CASE VIEW ── */
  .case-header { margin-bottom: 1.5rem; }
  .case-area-tag {
    display: inline-block; font-size: 0.72rem; font-weight: 500;
    padding: 3px 10px; border-radius: 999px;
    border: 1px solid; margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .case-title {
    font-family: 'Fraunces', serif;
    font-size: 1.35rem; font-weight: 600;
    color: var(--text); margin-bottom: 5px; line-height: 1.3;
  }
  .case-design { font-size: 0.85rem; color: var(--text2); }

  /* ── TABS ── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab-btn {
    padding: 8px 18px; font-family: 'DM Sans', sans-serif;
    font-size: 0.87rem; color: var(--text2);
    background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab-btn.active { color: var(--text); font-weight: 500; border-bottom-color: var(--accent); }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 7px;
  }
  .card-title svg { opacity: 0.6; }
  .objective-text { font-size: 0.92rem; color: var(--text2); line-height: 1.65; }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; table-layout: fixed; }
  th {
    text-align: left; font-size: 0.75rem; font-weight: 500;
    color: var(--text3); letter-spacing: 0.04em;
    padding: 6px 10px 10px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text2); vertical-align: top; word-wrap: break-word;
  }
  tr:last-child td { border-bottom: none; }
  .td-bold { font-weight: 500; color: var(--text); }
  .td-sig { color: var(--teal); font-size: 0.82rem; }

  /* ── 2-COL GRID ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  /* ── LIST ITEMS ── */
  .list-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.85rem; color: var(--text2); line-height: 1.5;
  }
  .list-item:last-child { border-bottom: none; }
  .list-num {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: 0.85rem; flex-shrink: 0; margin-top: 1px;
  }
  .list-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }

  /* ── MOVES GRID ── */
  .moves-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .move-card {
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    border-left-width: 3px; border-radius: 0 10px 10px 0;
    transition: background 0.15s;
  }
  .move-card:hover { background: var(--surface2); }
  .move-num-badge {
    display: inline-flex; width: 20px; height: 20px;
    border-radius: 50%; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 500; margin-bottom: 6px;
    color: #fff;
  }
  .move-title { font-size: 0.88rem; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .move-hint { font-size: 0.78rem; color: var(--text3); line-height: 1.5; }

  /* ── LANG NOTE ── */
  .lang-note {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.82rem; color: var(--text2); line-height: 1.5;
  }
  .lang-note:last-child { border-bottom: none; }

  /* ── PHASES / RUBRIC ── */
  .phase-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .phase-item:last-child { border-bottom: none; }
  .phase-min {
    font-family: 'Fraunces', serif; font-size: 0.82rem; font-weight: 600;
    color: var(--accent); min-width: 42px; padding-top: 1px;
  }
  .phase-name { font-size: 0.9rem; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .phase-desc { font-size: 0.82rem; color: var(--text3); }

  .rubric-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 9px 0; border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .rubric-item:last-child { border-bottom: none; }
  .rubric-check {
    width: 16px; height: 16px; border: 1px solid var(--border2);
    border-radius: 4px; flex-shrink: 0; margin-top: 1px;
  }
  .rubric-pts {
    margin-left: auto; font-size: 0.78rem; font-weight: 500;
    color: var(--text3); flex-shrink: 0; min-width: 32px; text-align: right;
  }
  .rubric-text { color: var(--text2); flex: 1; line-height: 1.5; }
  .rubric-total {
    display: flex; justify-content: flex-end; padding-top: 10px;
    border-top: 1px solid var(--border); margin-top: 4px;
    font-size: 0.92rem; font-weight: 500; color: var(--text);
  }

  .level-item {
    display: flex; gap: 12px; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .level-item:last-child { border-bottom: none; }
  .level-range { font-weight: 500; color: var(--text3); min-width: 44px; }
  .level-name { font-weight: 500; color: var(--text); min-width: 100px; }
  .level-desc { color: var(--text3); }

  /* ── GUIDE SECTION ── */
  .guide-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.85rem; color: var(--text2);
  }
  .guide-item:last-child { border-bottom: none; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 768px) {
    nav { width: 160px; min-width: 160px; }
    .two-col, .moves-grid, .groups-grid { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: repeat(2,1fr); }
    main { padding: 1.25rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Práctica · Redacción de la Discusión
  </div>
  <div class="header-meta">
    <span class="pill">60 alumnos</span>
    <span class="pill">10 grupos · 6 integrantes</span>
    <span class="pill">UPAO · 2025</span>
  </div>
</header>

<div class="app">
  <nav id="sidebar">
    <div class="nav-section">Grupos</div>
    <div id="group-nav"></div>
    <div class="nav-section" style="margin-top:12px">Docente</div>
    <button class="nav-btn" id="nav-overview" onclick="showOverview()">
      <svg class="nav-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Resumen
    </button>
    <button class="nav-btn" id="nav-phases" onclick="showPhases()">
      <svg class="nav-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>
      Fases
    </button>
    <button class="nav-btn" id="nav-rubric" onclick="showRubric()">
      <svg class="nav-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Rúbrica
    </button>
  </nav>
  <main id="main-content"></main>
</div>

<script>
const COLORS = ["#7c5cbf","#2cb67d","#4fc4cf","#f0a500","#e06c75","#3ddc97","#a78bfa","#06b6d4","#fb923c","#818cf8"];

const GROUPS = [
  {id:1,tema:"Hipertensión arterial y riesgo cardiovascular",area:"Cardiología",disenio:"Estudio transversal en 312 pacientes adultos de un hospital de tercer nivel",objetivo:"Determinar la asociación entre el control inadecuado de la presión arterial y la presencia de daño de órgano blanco en pacientes hipertensos",resultados:[{v:"Hipertensión no controlada",p:"57.1% (178/312)",e:""},{v:"Hipertrofia ventricular izquierda",p:"50.0% vs 22.6%",e:"OR = 3.48"},{v:"Microalbuminuria",p:"37.6% vs 11.9%",e:"OR = 4.21"},{v:"Retinopatía hipertensiva",p:"30.3% vs 9.4%",e:"OR = 4.13"},{v:"Asociación HTA no controlada – DOB",p:"p < 0.001",e:"IC95%: 2.8–5.2"}],lit:["López et al. (2021) – prevalencia DOB 44% en HTA no controlada","OMS 2023 – solo 21% de hipertensos con control adecuado en LATAM","Sánchez et al. (2022) – HVI como principal DOB en población peruana"],lim:["Diseño transversal: no permite establecer temporalidad","Centro único de tercer nivel: posible sesgo de selección","Medición única de PA: no refleja variabilidad circadiana"]},
  {id:2,tema:"Diabetes tipo 2 y adherencia terapéutica",area:"Endocrinología",disenio:"Cohorte prospectiva en 286 pacientes diabéticos tipo 2, seguimiento 12 meses",objetivo:"Evaluar el efecto de la baja adherencia terapéutica sobre el control glucémico a 12 meses",resultados:[{v:"Baja adherencia (Morisky ≤4)",p:"56.6% (162/286)",e:""},{v:"HbA1c >7% al mes 12",p:"71.6% vs 38.7%",e:"RR = 1.85"},{v:"Hospitalizaciones por descompensación",p:"18.5% vs 6.3%",e:"RR = 2.94"},{v:"Incremento medio HbA1c",p:"+1.4% vs +0.2%",e:"p < 0.001"},{v:"Neuropatía periférica nueva",p:"22.2% vs 9.6%",e:"HR = 2.31"}],lit:["García et al. (2022) – adherencia <50% en DM2 en ALC","Khunti et al. (2021) – cada 10% de reducción en adherencia aumenta HbA1c en 0.6%","Vargas et al. (2023) – factores asociados a baja adherencia en Perú"],lim:["Adherencia medida por autoinforme (sesgo de deseabilidad social)","Pérdida de seguimiento del 14%","No se controló cambios en estilo de vida durante el seguimiento"]},
  {id:3,tema:"Sepsis neonatal y mortalidad hospitalaria",area:"Neonatología",disenio:"Cohorte retrospectiva en 198 neonatos con sepsis, UCIN 2019–2023",objetivo:"Identificar los factores de riesgo asociados a mortalidad en neonatos con sepsis en UCIN",resultados:[{v:"Mortalidad global",p:"26.3% (52/198)",e:""},{v:"Sepsis tardía (>72h)",p:"Mortalidad 31.4% vs 18.7%",e:"OR = 1.99"},{v:"Gram negativos (E. coli, Klebsiella)",p:"Mortalidad 38.2%",e:"OR = 2.87"},{v:"SAPS II >35",p:"Mortalidad 48.6%",e:"OR = 4.12"},{v:"Ventilación mecánica",p:"Mortalidad 41.3%",e:"OR = 3.54"}],lit:["OPS 2023 – mortalidad por sepsis neonatal en LATAM: 22–35%","Fleischmann et al. (2022) – gram negativos predicen peor pronóstico","Coronado et al. (2023) – SAPS II como predictor en UCIN peruanas"],lim:["Diseño retrospectivo: datos incompletos en 18% de historias","Microorganismos no identificados en el 23% de casos","Centro único: flora microbiana local puede diferir"]},
  {id:4,tema:"Anemia en gestantes y bajo peso al nacer",area:"Ginecología–Obstetricia",disenio:"Estudio casos y controles en 350 gestantes (175 casos / 175 controles)",objetivo:"Determinar si la anemia materna en el segundo trimestre es factor de riesgo para bajo peso al nacer",resultados:[{v:"Anemia en casos (BPN)",p:"56.0% (98/175)",e:""},{v:"Anemia en controles",p:"29.7% (52/175)",e:""},{v:"Asociación anemia – BPN",p:"p < 0.001",e:"OR = 3.02 IC95%: 1.92–4.76"},{v:"Anemia severa (Hb <8 g/dL)",p:"OR = 5.41",e:"IC95%: 2.13–13.74"},{v:"Control prenatal <6 visitas",p:"OR = 2.18",e:"IC95%: 1.34–3.55"}],lit:["OMS 2023 – anemia afecta al 40% de gestantes en LATAM","Cutini et al. (2022) – OR = 2.8 para BPN en gestantes anémicas","Cisneros et al. (2021) – alto riesgo en zonas andinas peruanas"],lim:["Diseño retrospectivo: posible sesgo de información","Anemia evaluada solo en segundo trimestre","No se midieron otros micronutrientes (zinc, ácido fólico)"]},
  {id:5,tema:"EPOC y calidad de vida",area:"Neumología",disenio:"Estudio transversal en 224 pacientes con EPOC estadios II–IV (GOLD), nivel ambulatorio",objetivo:"Evaluar el impacto del estadio de EPOC sobre la calidad de vida medida con el cuestionario St. George",resultados:[{v:"SGRQ total – estadio II",p:"Media 38.4 (DS 11.2)",e:""},{v:"SGRQ total – estadio IV",p:"Media 71.8 (DS 14.6)",e:""},{v:"Diferencia estadio II vs IV",p:"33.4 puntos",e:"p < 0.001"},{v:"Correlación FEV1 – SGRQ",p:"r = –0.68",e:"p < 0.001"},{v:"Ansiedad/depresión (HAD ≥8)",p:"39.3% (88/224)",e:"OR = 2.41 vs GOLD II"}],lit:["Jones et al. (2021) – SGRQ ≥25 puntos = impacto clínicamente relevante","Iyer et al. (2022) – progresión GOLD se asocia con deterioro lineal en QoL","Fuentes et al. (2023) – prevalencia EPOC subestimada en adultos peruanos"],lim:["Diseño transversal: no permite evaluar cambio en el tiempo","Selección en centros ambulatorios: puede excluir casos severos","Diagnóstico espirométrico no disponible en el 12%"]},
  {id:6,tema:"Lactancia materna exclusiva y morbilidad infantil",area:"Pediatría",disenio:"Cohorte prospectiva en 418 pares madre–hijo, seguimiento hasta los 6 meses",objetivo:"Comparar la tasa de hospitalización por infecciones en lactantes con y sin lactancia materna exclusiva",resultados:[{v:"LME hasta 6 meses",p:"48.1% (201/418)",e:""},{v:"Hospitalización por IRA",p:"8.2% vs 22.7%",e:"RR = 0.36"},{v:"Hospitalización por EDA",p:"5.5% vs 17.4%",e:"RR = 0.32"},{v:"Días de hospitalización",p:"1.2 vs 3.8 días",e:"p < 0.001"},{v:"Cualquier hospitalización",p:"11.4% vs 30.4%",e:"RR = 0.38 IC95%: 0.24–0.58"}],lit:["OMS 2023 – LME protege frente a IRA y EDA en menores de 6 meses","Victora et al. (2022) – reducción del 73% de hospitalizaciones con LME","Quispe et al. (2022) – barreras para LME en contexto urbano peruano"],lim:["Adherencia a LME reportada por la madre (sesgo de deseabilidad)","Diferencias socioeconómicas no completamente controladas","Seguimiento limitado a 6 meses"]},
  {id:7,tema:"Depresión postparto y lactancia materna",area:"Psiquiatría perinatal",disenio:"Estudio transversal en 302 puérperas a las 6–8 semanas postparto",objetivo:"Determinar la asociación entre depresión postparto y abandono de la lactancia antes de los 3 meses",resultados:[{v:"Prevalencia de depresión postparto",p:"24.5% (74/302)",e:""},{v:"Abandono LM <3 meses con DPP",p:"64.9% (48/74)",e:""},{v:"Abandono LM <3 meses sin DPP",p:"22.8% (52/228)",e:"OR = 6.21"},{v:"Apoyo de pareja (factor protector)",p:"OR = 0.31",e:"IC95%: 0.17–0.57"},{v:"Parto por cesárea",p:"OR = 2.04",e:"IC95%: 1.18–3.53"}],lit:["Dennis & McQueen (2021) – DPP triplica el riesgo de abandono precoz","Shafiei et al. (2022) – meta-análisis: OR = 2.8 para abandono con DPP","Caro et al. (2023) – prevalencia DPP en Lima: 18–26%"],lim:["Diseño transversal: no permite establecer causalidad","EPDS como tamizaje: no sustituye diagnóstico psiquiátrico","Sesgo de selección: puérperas que no asistieron a control no incluidas"]},
  {id:8,tema:"Obesidad infantil y sedentarismo",area:"Medicina del deporte / Pediatría",disenio:"Estudio transversal en 489 escolares de 8–12 años, colegios urbanos de Trujillo",objetivo:"Evaluar la asociación entre tiempo de pantalla >2 h/día y obesidad en escolares de primaria",resultados:[{v:"Obesidad (IMC >2 DE OMS)",p:"20.0% (98/489)",e:""},{v:"Tiempo de pantalla >2 h/día",p:"65.0% (318/489)",e:""},{v:"Obesidad con >2 h de pantalla",p:"27.4% vs 6.5%",e:"OR = 5.46"},{v:"Actividad física <60 min/día",p:"OR = 2.98",e:"IC95%: 1.74–5.11"},{v:"Consumo diario de bebidas azucaradas",p:"OR = 3.21",e:"IC95%: 1.89–5.45"}],lit:["Tremblay et al. (2021) – sedentarismo ≥2 h/día duplica riesgo de obesidad","WHO 2022 – 81% de adolescentes no cumple recomendaciones de AF","Pajuelo et al. (2023) – obesidad infantil en escolares peruanos: 18.3%"],lim:["Tiempo de pantalla medido por autoinforme parental","Diseño transversal: no permite establecer dirección de la asociación","No se midió composición corporal (solo IMC)"]},
  {id:9,tema:"Adherencia a guías en dolor lumbar crónico",area:"Medicina familiar / Reumatología",disenio:"Auditoría clínica prospectiva en 267 pacientes con lumbalgia crónica en atención primaria",objetivo:"Evaluar el grado de adherencia al manejo no farmacológico de la lumbalgia crónica según guías NICE 2023",resultados:[{v:"Adherencia global a guías NICE",p:"42.3% adecuada",e:""},{v:"Prescripción de ejercicio terapéutico",p:"36.7% (98/267)",e:""},{v:"Derivación a fisioterapia",p:"27.0% (72/267)",e:""},{v:"Prescripción de AINE >30 días",p:"58.4% (156/267)",e:"No recomendado"},{v:"Abordaje psicológico (TCC)",p:"6.7% (18/267)",e:"Muy bajo"}],lit:["NICE 2023 – ejercicio + TCC como primera línea en lumbalgia crónica","Foster et al. (2022) – infrautilización de TCC en lumbalgia en LATAM","Maher et al. (2023) – AINE a largo plazo: riesgo supera beneficio"],lim:["Auditoría en único establecimiento de APS","No se evaluó nivel de conocimiento de los médicos sobre las guías","Posible sesgo de Hawthorne al ser un estudio de auditoría"]},
  {id:10,tema:"COVID-19 y secuelas respiratorias",area:"Neumología / Medicina interna",disenio:"Cohorte retrospectiva en 344 pacientes hospitalizados por COVID-19 grave, seguimiento 12 meses",objetivo:"Describir la prevalencia y factores asociados a secuelas respiratorias a los 12 meses post-COVID-19 grave",resultados:[{v:"Secuelas respiratorias a 12 meses",p:"54.1% (186/344)",e:""},{v:"Disnea de esfuerzo persistente",p:"41.3% (142/344)",e:""},{v:"DLCO <80% del predicho",p:"52.7% entre afectados",e:""},{v:"Ventilación mecánica invasiva (VMI)",p:"OR = 4.32",e:"IC95%: 2.54–7.35"},{v:"Diabetes como comorbilidad",p:"OR = 2.87",e:"IC95%: 1.63–5.04"}],lit:["Huang et al. (2021) – 76% de supervivientes presentan al menos 1 síntoma a 6 meses","Torres et al. (2022) – VMI como predictor más fuerte de secuelas pulmonares","Solis et al. (2023) – alta carga de post-COVID en hospitales peruanos"],lim:["Diseño retrospectivo: espirometría no disponible en todos los casos","Pérdida de seguimiento del 17% a los 12 meses","Variantes de SARS-CoV-2 no diferenciadas (período pre- y post-Ómicron)"]},

const MOVES = [
  {n:1,t:"Responder el objetivo",h:'Primer párrafo: ¿Se alcanzó el objetivo? Enuncia el hallazgo principal sin cifras nuevas. Ej.: "Este estudio demostró una asociación significativa entre…"',c:"#7c5cbf"},
  {n:2,t:"Comparar con literatura",h:'Usa los 3 artículos sugeridos. ¿Coinciden o difieren? Cita autor y año. Ej.: "Estos hallazgos son consistentes con [Autor, año], quienes…"',c:"#2cb67d"},
  {n:3,t:"Explicar diferencias",h:"Si algún resultado difiere de la literatura, razona el porqué: diseño, muestra, contexto, período. No te disculpes — argumenta.",c:"#a7a5b8"},
  {n:4,t:"Fortalezas del estudio",h:"1–2 oraciones. Diseño, muestra representativa, instrumento validado, seguimiento completo. Ej.: "Una fortaleza fue el uso de criterios diagnósticos estandarizados…"",c:"#3ddc97"},
  {n:5,t:"Limitaciones",h:"Usa las 3 del caso. Fórmula: [tipo de limitación] + [efecto potencial en los resultados] + "futuros estudios deberían…"",c:"#f0a500"},
  {n:6,t:"Implicancias y futuro",h:"¿Qué cambia en la práctica clínica? ¿Qué estudios se necesitan? Cierra con una sola oración de proyección hacia adelante.",c:"#e06c75"},
];

let currentView = 'overview';
let currentGroup = null;
let currentTab = 'caso';

function buildNav() {
  document.getElementById('group-nav').innerHTML = GROUPS.map(g => `
    <button class="nav-btn ${currentView==='group'&&currentGroup===g.id?'active':''}" onclick="showGroup(${g.id})">
      <span class="nav-dot" style="background:${COLORS[g.id-1]}"></span>
      Grupo ${g.id}
    </button>`).join('');
  ['overview','phases','rubric'].forEach(v => {
    const el = document.getElementById('nav-'+v);
    if(el) el.classList.toggle('active', currentView===v);
  });
}

function setContent(html) {
  document.getElementById('main-content').innerHTML = html;
}

function showGroup(id) {
  currentGroup = id; currentView = 'group'; currentTab = 'caso';
  buildNav();
  const g = GROUPS[id-1];
  const c = COLORS[id-1];
  const isObs = /transversal|retrospectiva|casos y controles/i.test(g.disenio);

  setContent(`
    <div class="case-header">
      <span class="case-area-tag" style="color:${c};border-color:${c}30;background:${c}12">
        Grupo ${g.id} · ${g.area}
      </span>
      <div class="case-title">${g.tema}</div>
      <div class="case-design">${g.disenio}</div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab-btn active" onclick="switchTab('caso')">Caso clínico</button>
      <button class="tab-btn" onclick="switchTab('guia')">Guía de redacción</button>
    </div>
    <div id="pane-caso">${renderCaso(g,c)}</div>
    <div id="pane-guia" style="display:none">${renderGuia(g,c,isObs)}</div>
  `);
}

function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('#tabs .tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (i===0&&name==='caso')||(i===1&&name==='guia')));
  document.getElementById('pane-caso').style.display = name==='caso'?'block':'none';
  document.getElementById('pane-guia').style.display = name==='guia'?'block':'none';
}

function renderCaso(g,c) {
  return `
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Objetivo del estudio
      </div>
      <p class="objective-text">${g.objetivo}</p>
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Resultados principales
      </div>
      <table>
        <thead><tr>
          <th style="width:42%">Variable</th>
          <th style="width:30%">Frecuencia / %</th>
          <th style="width:28%">Estadístico</th>
        </tr></thead>
        <tbody>${g.resultados.map(r=>`<tr>
          <td>${r.v}</td>
          <td class="td-bold">${r.p}</td>
          <td>${r.e?`<span class="td-sig">${r.e}</span>`:'—'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          Literatura sugerida
        </div>
        ${g.lit.map((l,i)=>`<div class="list-item">
          <span class="list-num" style="color:${c}">${i+1}.</span>
          <span>${l}</span>
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Limitaciones a declarar
        </div>
        ${g.lim.map(l=>`<div class="list-item">
          <span class="list-dot" style="background:${c}"></span>
          <span>${l}</span>
        </div>`).join('')}
      </div>
    </div>`;
}

function renderGuia(g,c,isObs) {
  const langNote = isObs
    ? 'Diseño observacional → usa "se observó una asociación" o "se asoció con". Evita afirmar causalidad.'
    : 'Diseño de cohorte → "se asoció con" y "predijo" son apropiados. La causalidad requiere un ECA bien controlado.';
  return `
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
        Los 6 movimientos — qué escribir
      </div>
      <div class="moves-grid">
        ${MOVES.map(m=>`<div class="move-card" style="border-left-color:${m.c}">
          <span class="move-num-badge" style="background:${m.c}">${m.n}</span>
          <div class="move-title">${m.t}</div>
          <div class="move-hint">${m.h}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Nota de lenguaje para este caso
      </div>
      ${[
        langNote,
        'Primer párrafo: 3–5 oraciones. No incluir cifras nuevas que no aparezcan en Resultados.',
        'Citar así: "Estos resultados son consistentes con [Autor, año], quienes reportaron…"',
        'Limitaciones: [nombre] + [efecto potencial sobre los resultados] + "futuros estudios deberían…"',
      ].map(t=>`<div class="lang-note">
        <span class="list-dot" style="background:${c};margin-top:6px"></span>
        <span>${t}</span>
      </div>`).join('')}
    </div>`;
}

function showOverview() {
  currentView='overview'; currentGroup=null; buildNav();
  setContent(`
    <div class="page-title">Distribución de los 10 grupos</div>
    <div class="page-sub">Selecciona un grupo para ver su caso clínico completo y la guía de redacción.</div>
    <div class="metrics">
      ${[['60','alumnos'],['10','grupos'],['6','movimientos'],['20','puntos']].map(([v,l])=>`
        <div class="metric-card">
          <div class="metric-val">${v}</div>
          <div class="metric-lbl">${l}</div>
        </div>`).join('')}
    </div>
    <div class="groups-grid">
      ${GROUPS.map(g=>`
        <div class="group-card" onclick="showGroup(${g.id})">
          <div class="group-card-top">
            <span class="nav-dot" style="background:${COLORS[g.id-1]}"></span>
            <span class="group-card-num">Grupo ${g.id} · ${g.area}</span>
          </div>
          <div class="group-card-title">${g.tema}</div>
          <div class="group-card-sub">${g.disenio.substring(0,65)}…</div>
        </div>`).join('')}
    </div>`);
}

function showPhases() {
  currentView='phases'; currentGroup=null; buildNav();
  setContent(`
    <div class="page-title">Estructura de la actividad</div>
    <div class="page-sub" style="margin-bottom:1.5rem">40 minutos en total.</div>
    <div class="card">
      ${[
        {min:"5 min",n:"Lectura del caso",d:"Cada grupo lee su caso clínico, los resultados y los artículos sugeridos en silencio."},
        {min:"30 min",n:"Redacción en grupos",d:"Redactar la Discusión completa con los 6 movimientos. El docente circula entre los grupos para orientar."},
        {min:"5 min",n:"Revisión con checklist",d:"Cada grupo verifica internamente que su Discusión tiene los 6 movimientos antes de la puesta en común."},
        {min:"10 min",n:"Puesta en común",d:"2 grupos exponen su Discusión (5 min c/u). La clase retroalimenta guiada por la rúbrica."},
      ].map(p=>`<div class="phase-item">
        <span class="phase-min">${p.min}</span>
        <div>
          <div class="phase-name">${p.n}</div>
          <div class="phase-desc">${p.d}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Guía para la puesta en común
      </div>
      ${[
        'Seleccionar 2 grupos (al azar o voluntarios) para exponer su Discusión — 5 min cada uno.',
        'Proyectar el caso del grupo que expone para que todos tengan el contexto.',
        'La clase evalúa: ¿respondió el objetivo? ¿comparó con literatura? ¿declaró limitaciones?',
        'Señalar 1 fortaleza y 1 oportunidad de mejora por grupo expuesto.',
        'Cierre docente: reforzar la calibración del lenguaje según el diseño del estudio.',
      ].map(s=>`<div class="guide-item">
        <span class="list-dot" style="background:var(--sky);margin-top:6px"></span>
        <span>${s}</span>
      </div>`).join('')}
    </div>`);
}

function showRubric() {
  currentView='rubric'; currentGroup=null; buildNav();
  setContent(`
    <div class="page-title">Rúbrica de evaluación</div>
    <div class="page-sub" style="margin-bottom:1.5rem">20 puntos en total.</div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Criterios
      </div>
      ${[
        {c:"Responde directamente el objetivo en el primer párrafo",p:3},
        {c:"Compara con al menos 2 estudios de la literatura sugerida con citas correctas",p:4},
        {c:"Explica las diferencias con argumentos (metodológicos, poblacionales o contextuales)",p:3},
        {c:"Menciona al menos 1 fortaleza metodológica del estudio",p:2},
        {c:"Declara las 3 limitaciones con su efecto potencial y sugerencia futura",p:4},
        {c:"Señala al menos 1 implicancia clínica o de salud pública concreta",p:2},
        {c:"Lenguaje calibrado: no usa causalidad en diseño observacional; hedging adecuado",p:2},
      ].map(r=>`<div class="rubric-item">
        <span class="rubric-check"></span>
        <span class="rubric-text">${r.c}</span>
        <span class="rubric-pts">${r.p} pt${r.p>1?'s':''}</span>
      </div>`).join('')}
      <div class="rubric-total">Total: 20 pts</div>
    </div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
        Niveles de desempeño
      </div>
      ${[
        {r:"18–20",l:"Excelente",d:"Todos los movimientos presentes, lenguaje apropiado, literatura bien argumentada."},
        {r:"14–17",l:"Bueno",d:"La mayoría de movimientos, alguna debilidad en comparación o limitaciones."},
        {r:"10–13",l:"En desarrollo",d:"Estructura incompleta, mezcla resultados con interpretación o no declara limitaciones."},
        {r:"< 10",l:"Insuficiente",d:"Repite resultados, no cita literatura, omite limitaciones e implicancias."},
      ].map(n=>`<div class="level-item">
        <span class="level-range">${n.r}</span>
        <span class="level-name">${n.l}</span>
        <span class="level-desc">${n.d}</span>
      </div>`).join('')}
    </div>`);
}

buildNav();
showOverview();
</script>
</body>
</html>
